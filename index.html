<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Guru - Smart Investing</title>
    <style>
        body {
            background-color: #0b0d17;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        /* 1. Logo link style */
        .logo-link {
            display: inline-block;
            margin-top: 20px;
        }
        .logo {
            width: 120px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            transition: transform 0.3s;
        }
        .logo:hover { transform: scale(1.1); }

        .main-title {
            color: #ffd700;
            font-size: 26px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        /* 2. Main Button style */
        .btn-main {
            display: block;
            background: linear-gradient(to right, #ffd700, #b8860b);
            border: none;
            padding: 15px;
            border-radius: 25px;
            color: black;
            font-weight: bold;
            width: 85%;
            max-width: 350px;
            margin: 15px auto;
            text-decoration: none; /* Link underline hatane ke liye */
            font-size: 18px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 25px auto;
            max-width: 400px;
        }
        .grid-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #444;
            padding: 20px;
            border-radius: 12px;
            font-size: 14px;
        }

        /* 3. Floating Telegram Button */
        .floating-tg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #0088cc;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>
<body>

    <a href="https://t.me/+lmb7xj54XB43ZjM1" class="logo-link">
        <img src="https://via.placeholder.com/150" alt="Logo" class="logo">
    </a>

    <h1 class="main-title">INVESTMENT GURU™</h1>
    <p style="opacity: 0.8;">Safe & Secure Investment Plans</p>

    <a href="https://t.me/+lmb7xj54XB43ZjM1" class="btn-main">
        🚀 JOIN TELEGRAM NOW
    </a>

    <div class="grid-container">
        <div class="grid-item">💰 High Returns</div>
        <div class="grid-item">🔒 100% Safe</div>
        <div class="grid-item">📲 Daily Updates</div>
        <div class="grid-item">🎁 Special Offers</div>
    </div>

    <a href="https://t.me/+lmb7xj54XB43ZjM1" class="floating-tg">
        Join Channel ✈️
    </a>

</body>
</html>
