<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Guru - Premium</title>
    <style>
        @keyframes gradientRun {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background-color: #05070a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .brand-name {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .tagline {
            color: #00ff88;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .logo {
            width: 130px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            margin-bottom: 20px;
        }

        /* Moving Color Button Template */
        .btn-animate {
            display: block;
            width: 85%;
            max-width: 350px;
            margin: 15px auto;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientRun 5s ease infinite; /* Color running effect */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            text-transform: uppercase;
        }

        /* Outline Moving Border Button */
        .btn-outline {
            display: inline-block;
            margin: 10px 0;
            padding: 10px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            color: #ffd700;
            border: 2px solid;
            border-image: linear-gradient(to right, #ffd700, #00ff88) 1;
            background: transparent;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 25px auto;
            max-width: 400px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            font-size: 13px;
        }

        .description {
            padding: 25px;
            color: #bdc3c7;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <a href="https://t.me/+lmb7xj54XB43ZjM1">
        <img src="https://via.placeholder.com/150" alt="Investment Guru Logo" class="logo">
    </a>

    <div class="brand-name">INVESTMENT GURU™</div>
    <div class="tagline">Trade smarter. Win faster.</div>

    <a href="https://t.me/+lmb7xj54XB43ZjM1" class="btn-outline">Signals & Plans</a>

    <a href="https://t.me/+lmb7xj54XB43ZjM1" class="btn-animate">
        🚀 Join Us On Telegram
    </a>

    <div class="grid-container">
        <div class="grid-item">⚡ <b>3 Min Withdrawal</b></div>
        <div class="grid-item">📈 <b>Daily Signals</b></div>
        <div class="grid-item">🔄 <b>Loss Recovery</b></div>
        <div class="grid-item">✅ <b>Official Channel</b></div>
    </div>

    <div class="description">
        <b>INVESTMENT GURU™</b> delivers high-accuracy investment strategies with speed, discipline, and precision built for serious players.
    </div>

    <a href="https://t.me/+lmb7xj54XB43ZjM1" class="btn-animate">
        💰 Start Earning Now
    </a>

</body>
</html>
